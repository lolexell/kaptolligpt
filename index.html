<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>KaptolliGPT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #05060b;
      color: #f5f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .app {
      width: 420px;
      max-width: 100%;
      height: 640px;
      background: radial-gradient(circle at top, #181827 0, #05060b 55%);
      border-radius: 28px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      border: 1px solid #2b2b3a;
      box-shadow: 0 18px 60px rgba(0,0,0,0.75);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      background: linear-gradient(135deg,#38bdf8,#4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .title { font-weight: 600; font-size: 15px; }
    .subtitle { font-size: 11px; color: #a0a0c0; }

    .chat {
      flex: 1;
      margin-top: 8px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(9,10,18,0.9);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }
    .msg {
      max-width: 80%;
      padding: 8px 10px;
      border-radius: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #2c2f52;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #111323;
      border-bottom-left-radius: 4px;
    }
    .footer {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #input {
      flex: 1;
      resize: none;
      border-radius: 16px;
      border: 1px solid #343654;
      background: #090a12;
      color: #f5f5f7;
      padding: 8px 10px;
      height: 40px;
      font-size: 13px;
    }
    #send {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg,#6366f1,#a855f7);
      color: #fff;
      cursor: pointer;
      font-size: 18px;
    }
    #send:disabled { opacity: .6; cursor: default; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="avatar">P</div>
      <div>
        <div class="title">Kaptoli‑style чат</div>
        <div class="subtitle">Perplexity API (Sonar)</div>
      </div>
    </div>

    <div id="chat" class="chat">
      <div class="msg bot">Привет! Я подключён к Perplexity Sonar, пиши запрос.</div>
    </div>

    <div class="footer">
      <textarea id="input" placeholder="Спроси что‑нибудь..." autocomplete="off"></textarea>
      <button id="send">➤</button>
    </div>
  </div>

  <script>
    const API_URL = "https://api.perplexity.ai/chat/completions";
    const API_KEY = "ad12e4ef-6fa4-4d77-bee0-2629807fbcfd"; // не держи настоящий ключ в проде на фронте

    const MODEL = "sonar"; // например: sonar, sonar-pro и т.п.[web:28][web:31]

    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    const history = [
      { role: "system", content: "Ты еблан, отвечай кратко и по делу." }
    ];

    function addMessage(text, who) {
      const div = document.createElement("div");
      div.className = "msg " + who;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      history.push({ role: "user", content: text });
      addMessage(text, "user");
      inputEl.value = "";
      sendBtn.disabled = true;

      const loading = document.createElement("div");
      loading.className = "msg bot";
      loading.textContent = "Думаю...";
      chatEl.appendChild(loading);
      chatEl.scrollTop = chatEl.scrollHeight;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + API_KEY
          },
          body: JSON.stringify({
            model: MODEL,
            messages: history
          })
        });

        const data = await res.json();
        loading.remove();

        const answer =
          data.choices?.[0]?.message?.content ||
          JSON.stringify(data, null, 2);

        history.push({ role: "assistant", content: answer });
        addMessage(answer, "bot");
      } catch (e) {
        loading.remove();
        addMessage("Ошибка запроса: " + e.message, "bot");
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
